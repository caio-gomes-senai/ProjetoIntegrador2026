<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ColdTrack</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="div-principal">
        <div class="div-cadastro">
            <p class="p1">Seja Bem-vindo(a)</p>
            <p class="p2">Novo por aqui?</p>
            <p class="p3">Crie sua conta em poucos segundos!</p>
            <a th:href="@{/cadastro}"><button class="button-cadastro">Cadastre-se</button></a>
        </div>

        <form th:action="@{/login}" th:object="${loginDto}" method="post">
            <div class="div-secundaria">
                <img class="logo" th:src="@{/img/Logo ColdTrack.png}" alt="Logo">

                <div th:if="${error}" style="color: red; text-align: center; margin-bottom: 10px;">
                    Email ou senha inválidos.
                </div>

                <input type="email" placeholder="Email" th:field="*{email}" required>
                <input type="password" placeholder="Senha" th:field="*{senha}" required>
                
                <button type="submit">Login</button>
            </div>
       </form>
    </div>
</body>
</html>
