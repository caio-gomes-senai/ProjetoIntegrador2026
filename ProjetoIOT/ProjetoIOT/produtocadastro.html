    <div class="title-div">
        <h6 class="title">Cadastre um Produto</h6>

    <div class="form-div">
        <form action="">
            <p>Nome do produto</p>
            <input type="text" required>
            <p>Data de Validade</p>
            <input type="date" required>
            <p>Temperatura Mínima</p>
            <input type="number" required>
            <p>Temperatura Máxima</p>
            <input type="number" required>
            <p>Selecione o Refrigerador que o produto está armazenado</p>
            <select name="" id="" required>
                <option value="">Refrigerador 1</option>
            </select>
            <button>Cadastrar</button>
        </form>
    </div>
